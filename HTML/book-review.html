<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Academic Book Review</title>
    <link rel="icon" href="../images/favicon.svg" type="image/svg+xml"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-logo">My Portfolio</div>
            <ul class="nav-links">
                <li><a href="../index.html">← Back to Portfolio</a></li>
            </ul>
        </div>
    </nav>

    <section class="model-hero">
        <div class="model-hero-content">
            <p class="hero-tag">Book Review</p>
            <h1>Critical Book <span class="highlight">Review</span></h1>
            <p class="hero-sub">A comprehensive book reveiw of Psychology of Money completed during my B.Com.</p>
        </div>
    </section>

    <section class="calculator-section" style="padding-top: 0;">
        <div class="calculator-vertical" style="max-width: 1000px; margin: 0 auto;">
            
            <div class="calc-inputs-top" style="padding: 1rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 0 1rem;">
                    <h3 style="margin: 0;">📄 Review Report</h3>
                    <a href="../assets/PDF/Book_Review.pdf" target="_blank" class="btn-secondary" style="padding: 8px 16px; font-size: 0.85rem;">
                        Open in New Tab ↗
                    </a>
                </div>

                <div style="width: 100%; height: 75vh; border-radius: 8px; overflow: hidden; border: 1px solid var(--border);">
                    <iframe 
                        src="../assets/PDF/Book_Review.pdf" 
                        width="100%" 
                        height="100%" 
                        style="border: none;">
                        <p>Your browser does not support PDFs. 
                        <a href="../assets/PDF/Book_Review.pdf" style="color: var(--accent);">Download the PDF</a>.</p>
                    </iframe>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>Built with 💛 | Business Portfolio © 2026 | <a href="../index.html" style="color:var(--accent); text-decoration:none;">← Back to Portfolio</a></p>
    </footer>

    <script>
        // Simple navbar shadow effect for the sub-page
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.style.boxShadow = '0 4px 30px rgba(0,0,0,0.4)';
            } else {
                navbar.style.boxShadow = 'none';
            }
        });
    </script>
</body>
</html>
